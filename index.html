<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wracker !</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ─── Google Sheets Config ─────────────────────────────────────────────────────
        // ⚠️ นำลิงก์ Web App URL ที่ได้จากการ Deploy Apps Script รอบล่าสุดมาวางทับที่นี่
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbxFhNDUOLEDW6IIfGm9VYZWZSpnN9RHCRaCnddAEiOF6Yk3qlieWG9x0_CiFs-L5B4e/exec";

        async function sheetLoad() {
          try {
            const res = await fetch(SHEET_URL);
            if (!res.ok) throw new Error("fetch_failed");
            const data = await res.json();
            return data?.logs ? data : { logs: {} };
          } catch { return null; }
        }

        async function sheetSave(allData) {
          const encoded = encodeURIComponent(JSON.stringify(allData));
          const res = await fetch(`${SHEET_URL}?action=save&data=${encoded}`);
          if (!res.ok) throw new Error("save_failed");
        }

        // ─── Data ─────────────────────────────────────────────────────────────────────
        const SCHEDULE = {
          0: { type: "rest",         label: "Rest",              sub: "Full Recovery 😴" },
          1: { type: "cardio",       label: "Zone 2 Cardio",     sub: "25–35 min / HR 138–150" },
          2: { type: "calisthenics", label: "Full Body Strength", sub: "Routine A" },
          3: { type: "cardio",       label: "Zone 2 Cardio",     sub: "25–35 min / HR 138–150" },
          4: { type: "calisthenics", label: "Full Body Strength", sub: "Routine A" },
          5: { type: "cardio",       label: "Zone 2 Cardio",     sub: "25–35 min / HR 138–150" },
          6: { type: "calisthenics", label: "Full Body Strength", sub: "Routine A" },
        };

        const EXERCISES = [
          { id: "aus_pull",   name: "Australian Pull-Ups",   icon: "🏋️", target: "Max Reps",   goal: "Build pulling base" },
          { id: "neg_pull",   name: "Negative Pull-Ups",     icon: "⬇️", target: "3–5 reps",   goal: "3–5 sec slow eccentric" },
          { id: "dec_push",   name: "Decline Push-Ups",      icon: "💪", target: "Max Reps",   goal: "Upper chest & shoulder" },
          { id: "pike_push",  name: "Incline Pike Push-Ups", icon: "🔺", target: "8–10 reps",  goal: "Handstand / Overhead base" },
          { id: "knee_raise", name: "Hanging Knee Raises",   icon: "🦵", target: "10–12 reps", goal: "Core compression for L-sit" },
          { id: "squats",     name: "Bodyweight Squats",     icon: "🦴", target: "15–20 reps", goal: "Leg endurance" },
        ];

        const DAYS_TH = ["อา","จ","อ","พ","พฤ","ศ","ส"];
        function dateKey(d = new Date()) { return d.toISOString().slice(0, 10); }

        // ฟังก์ชันช่วยคำนวณ Average Pace จากเวลา (นาที) และระยะทาง (กิโลเมตร)
        function calculatePace(duration, distance) {
          if (!duration || !distance || Number(distance) === 0) return "—";
          const totalSeconds = (Number(duration) * 60) / Number(distance);
          const paceMinutes = Math.floor(totalSeconds / 60);
          const paceSeconds = Math.round(totalSeconds % 60);
          return `${paceMinutes}:${paceSeconds < 10 ? '0' : ''}${paceSeconds}`;
        }

        // ─── AI Insight ───────────────────────────────────────────────────────────────
        async function generateInsights(logs) {
          const entries = Object.entries(logs).sort(([a],[b]) => a.localeCompare(b));
          if (entries.length === 0) throw new Error("no_data");

          const cardioEntries = entries
            .filter(([,v]) => v.type === "cardio")
            .map(([date,v]) => ({ date, duration: v.duration, distance: v.distance || 0, pace: calculatePace(v.duration, v.distance), avgHR: v.avgHR, notes: v.notes || "" }));

          const calsEntries = entries
            .filter(([,v]) => v.type === "calisthenics")
            .map(([date,v]) => ({
              date,
              exercises: EXERCISES.map(ex => ({
                name: ex.name,
                sets: (v.exercises?.[ex.id] || []).map(Number).filter(Boolean)
              }))
            }));

          const prompt = `You are a calisthenics and Zone 2 cardio coach. Analyze this athlete's workout data and provide concise, actionable insights in Thai language.

        ZONE 2 CARDIO DATA (target: 25-35 min, HR 138-150 bpm):
        ${JSON.stringify(cardioEntries, null, 2)}

        CALISTHENICS DATA (3 sets each, Routine A):
        ${JSON.stringify(calsEntries, null, 2)}

        Respond ONLY with a JSON object (no markdown, no text outside JSON):
        {
          "overall": { "rating": "A/B/C/D/F", "summary": "2-3 sentences in Thai" },
          "cardio": {
            "trend": "up|down|stable|insufficient_data",
            "insight": "2-3 sentences in Thai",
            "tip": "one actionable tip in Thai"
          },
          "strength": [
            { "exercise": "exact exercise name", "trend": "up|down|stable|insufficient_data", "insight": "one sentence in Thai", "tip": "one tip in Thai" }
          ],
          "priority": { "focus": "most important focus now in Thai", "next_milestone": "next milestone in Thai" },
          "consistency": { "score": 0-100, "comment": "one sentence in Thai" }
        }`;

          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1500,
              messages: [{ role: "user", content: prompt }]
            })
          });
          if (!res.ok) throw new Error("api_error");
          const data = await res.json();
          const text = data.content?.find(b => b.type === "text")?.text || "";
          const match = text.match(/\{[\s\S]*\}/);
          if (!match) throw new Error("parse_error");
          return JSON.parse(match[0]);
        }

        // ─── Styles ───────────────────────────────────────────────────────────────────
        const css = `
          @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
          * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
          
          body { 
            background: #080c14; 
            color: #e8edf5; 
            font-family: 'Barlow', sans-serif; 
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
          }
          
          :root {
            --cyan:#00d4ff; --orange:#ff6b2b; --green:#00e676; --purple:#a855f7; --danger:#ff4757;
            --card:#101824; --card2:#141e2c; --border:rgba(255,255,255,0.07); --text2:#7a8fa8;
          }
          
          input:focus { outline: 2px solid var(--cyan) !important; }
          @keyframes spin    { to { transform: rotate(360deg); } }
          @keyframes pulse   { 0%,100%{opacity:0.3} 50%{opacity:1} }
          @keyframes fadeIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
          .fade-in { animation: fadeIn 0.35s ease forwards; }
          
          .ios-container { 
            padding-top: env(safe-area-inset-top, 24px); 
            padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 75px);
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            position: relative;
          }
          
          button { cursor: pointer; touch-action: manipulation; }
          
          .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: rgba(10, 16, 32, 0.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            display: flex;
            padding-bottom: env(safe-area-inset-bottom, 12px);
            z-index: 999;
          }

          .bubble-btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 100px;
            color: #ffffff;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 950;
            font-size: 17px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
          }

          .bubble-btn:active {
            transform: scale(0.96);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4) !important;
          }

          .bubble-btn::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 5%;
            width: 90%;
            height: 35%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0) 100%);
            border-radius: 50px 50px 20px 20px;
            pointer-events: none;
          }

          .bubble-btn-cardio {
            background: linear-gradient(135deg, #00d4ff 0%, #008cb3 100%);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.35), inset 0 -4px 8px rgba(0,0,0,0.2);
          }

          .bubble-btn-calisthenics {
            background: linear-gradient(135deg, #ff6b2b 0%, #cc3f00 100%);
            box-shadow: 0 8px 24px rgba(255, 107, 43, 0.35), inset 0 -4px 8px rgba(0,0,0,0.2);
          }
        `;

        // ─── App ──────────────────────────────────────────────────────────────────────
        function App() {
          const [tab, setTab]           = useState("today");
          const [allData, setAllData]   = useState({ logs: {} });
          const [syncStatus, setSyncStatus] = useState("loading");
          const [toast, setToast]       = useState("");
          const [logging, setLogging]   = useState(false);
          const [logType, setLogType]   = useState("cardio");

          const today    = new Date();
          const todayKey = dateKey(today);
          const schedule = SCHEDULE[today.getDay()];
          const todayLog = allData.logs[todayKey] || null;

          useEffect(() => {
            (async () => {
              setSyncStatus("loading");
              const data = await sheetLoad();
              if (data) { setAllData(data); setSyncStatus("ready"); }
              else { setSyncStatus("error"); showToast("⚠️ โหลดจาก Google Sheets ไม่สำเร็จ", true); }
            })();
          }, []);

          const showToast = (msg, isError = false) => {
            setToast({ msg, isError });
            setTimeout(() => setToast(""), 3500);
          };

          const handleSaveLog = async (logData) => {
            // บันทึกแยกชนิดให้อยู่ในก้อน Object เดียวกันของวันนั้น ๆ เพื่อความเป็นระเบียบเรียบร้อยในชีต
            const currentDayObj = allData.logs[todayKey] || {};
            let updatedDayObj = {};

            if (logData.type === "cardio") {
              updatedDayObj = { ...currentDayObj, type: "cardio", duration: logData.duration, distance: logData.distance, avgHR: logData.avgHR, notes: logData.notes };
            } else {
              updatedDayObj = { ...currentDayObj, type: "calisthenics", exercises: logData.exercises };
            }

            const updated = { ...allData, logs: { ...allData.logs, [todayKey]: updatedDayObj } };
            setAllData(updated);
            setLogging(false);
            setSyncStatus("saving");
            try {
              await sheetSave(updated);
              setSyncStatus("ready");
              showToast("✅ บันทึกลง Google Sheets แล้ว");
            } catch {
              setSyncStatus("error");
              showToast("⚠️ บันทึกไม่สำเร็จ ข้อมูลยังอยู่ใน session นี้", true);
            }
          };

          const openLogScreen = (type) => {
            setLogType(type);
            setLogging(true);
          };

          const TABS = [["today","📅","วันนี้"],["history","📊","ประวัติ"],["insight","🧠","Insight"],["stats","🏆","สถิติ"]];

          return (
            <>
              <style>{css}</style>
              <div className="ios-container">

                {/* Header */}
                <div style={{ padding: "16px 16px 12px", background: "linear-gradient(180deg,#0d1520,transparent)" }}>
                  <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 11, letterSpacing: 3, color: "var(--cyan)", textTransform: "uppercase", marginBottom: 2 }}>Weekly Training</div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 26 }}>Calisthenics & Zone 2</div>
                    <SyncBadge status={syncStatus} />
                  </div>
                </div>

                {/* Toast */}
                {toast && (
                  <div style={{ margin: "0 16px 12px", padding: "12px 14px", background: toast.isError ? "#200a0a" : "#001a0e", border: `1px solid ${toast.isError ? "var(--danger)" : "var(--green)"}50`, borderRadius: 12, fontSize: 13, color: toast.isError ? "var(--danger)" : "var(--green)", animation: "fadeIn 0.2s ease" }}>
                    {toast.msg}
                  </div>
                )}

                {/* Content Area */}
                <div style={{ flex: 1, padding: "0 4px" }}>
                  {syncStatus === "loading" ? <LoadingScreen /> :
                   logging ? <LogScreen logType={logType} onSave={handleSaveLog} onCancel={() => setLogging(false)} existingLog={todayLog} saving={syncStatus === "saving"} /> :
                   tab === "today"   ? <TodayScreen schedule={schedule} today={today} todayLog={todayLog} onLogCardio={() => openLogScreen("cardio")} onLogCals={() => openLogScreen("calisthenics")} /> :
                   tab === "history" ? <HistoryScreen today={today} logs={allData.logs} /> :
                   tab === "insight" ? <InsightScreen logs={allData.logs} /> :
                                       <StatsScreen logs={allData.logs} />}
                </div>

                {/* Bottom Nav */}
                {!logging && syncStatus !== "loading" && (
                  <div className="bottom-nav">
                    {TABS.map(([id, icon, label]) => (
                      <button key={id} onClick={() => setTab(id)} style={{ flex: 1, padding: "12px 0 8px", background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                        <span style={{ fontSize: 20 }}>{icon}</span>
                        <span style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 11, fontWeight: 700, letterSpacing: 0.8, color: tab === id ? "var(--cyan)" : "var(--text2)", textTransform: "uppercase" }}>{label}</span>
                        {tab === id && <div style={{ width: 16, height: 2, background: "var(--cyan)", borderRadius: 1, marginTop: 2 }} />}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </>
          );
        }

        // ─── Sub-Components ───────────────────────────────────────────────────────────
        function SyncBadge({ status }) {
          const map = {
            loading: ["#f0a500", "⟳", "กำลังโหลด…"],
            ready:   ["var(--green)", "☁️", "Sheets"],
            saving:  ["var(--cyan)", "⟳", "กำลังบันทึก…"],
            error:   ["var(--danger)", "✕", "Sync Error"],
          };
          const [color, icon, label] = map[status] || map.error;
          const spin = status === "loading" || status === "saving";
          return (
            <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color, background: `${color}15`, padding: "4px 10px", borderRadius: 20, border: `1px solid ${color}40` }}>
              <span style={{ animation: spin ? "spin 1s linear infinite" : "none", display: "inline-block" }}>{icon}</span>
              <span>{label}</span>
            </div>
          );
        }

        function LoadingScreen() {
          return (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "80px 20px", gap: 14 }}>
              <div style={{ fontSize: 52 }}>📊</div>
              <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, fontSize: 20, color: "var(--cyan)" }}>กำลังโหลดจาก Google Sheets</div>
              <div style={{ fontSize: 13, color: "var(--text2)" }}>รอสักครู่…</div>
              <div style={{ display: "flex", gap: 8 }}>
                {[0,1,2].map(i => <div key={i} style={{ width: 8, height: 8, borderRadius:"50%", background: "var(--cyan)", animation: `pulse 1.2s ${i*0.2}s ease-in-out infinite` }} />)}
              </div>
            </div>
          );
        }

        function TodayScreen({ schedule, today, todayLog, onLogCardio, onLogCals }) {
          const dayName = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"][today.getDay()];
          const dateStr = today.toLocaleDateString("th-TH", { day:"numeric", month:"long", year:"numeric" });
          const tc = schedule.type === "cardio" ? "var(--cyan)" : schedule.type === "calisthenics" ? "var(--orange)" : "var(--text2)";
          const ti = schedule.type === "cardio" ? "🏃" : schedule.type === "calisthenics" ? "💪" : "😴";

          return (
            <div style={{ padding: "0 12px" }}>
              <div style={{ background:"var(--card)", borderRadius:20, padding:20, marginBottom:20, border:"1px solid var(--border)", position:"relative", overflow:"hidden" }}>
                <div style={{ position:"absolute", top:-20, right:-20, fontSize:100, opacity:0.06 }}>{ti}</div>
                <div style={{ fontSize:12, color:"var(--text2)", marginBottom:4 }}>{dateStr}</div>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:28, marginBottom:10 }}>วัน{dayName}</div>
                <div style={{ display:"inline-flex", alignItems:"center", gap:8, background:`${tc}18`, border:`1px solid ${tc}40`, borderRadius:100, padding:"6px 14px" }}>
                  <span style={{ fontSize:16 }}>{ti}</span>
                  <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:15, color:tc }}>เป้าหมายตาราง: {schedule.label}</span>
                </div>
                <div style={{ marginTop:8, fontSize:13, color:"var(--text2)" }}>{schedule.sub}</div>
              </div>

              {todayLog && (
                <div style={{ background:"#001a0e", border:"1px solid #00e67640", borderRadius:16, padding:16, marginBottom:20 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:"var(--green)" }} />
                    <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:16, color:"var(--green)" }}>บันทึกข้อมูลวันนี้แล้ว ✓</span>
                  </div>
                  <LogSummary log={todayLog} schedule={todayLog} />
                </div>
              )}

              <div style={{ background: "rgba(255,255,255,0.02)", padding: "16px", borderRadius: 20, border: "1px solid var(--border)", marginBottom: 20 }}>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:12, letterSpacing:1.5, color:"var(--text2)", textTransform:"uppercase", marginBottom:12, textAlign: "center" }}>⚡ เลือกบันทึกผลการฝึกซ้อม</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <button onClick={onLogCardio} className="bubble-btn bubble-btn-cardio">
                    🏃 บันทึก Zone 2 Cardio
                  </button>
                  <button onClick={onLogCals} className="bubble-btn bubble-btn-calisthenics">
                    💪 บันทึก Calisthenics
                  </button>
                </div>
              </div>

              {schedule.type === "calisthenics" && (
                <div style={{ marginTop:14 }}>
                  <SecLabel>Routine A — 3 Sets Each</SecLabel>
                  {EXERCISES.map((ex, i) => (
                    <div key={ex.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", background:"var(--card)", borderRadius:12, marginBottom:8, border:"1px solid var(--border)" }}>
                      <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:18, color:"var(--orange)", width:22 }}>{i+1}</div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontWeight:600, fontSize:14 }}>{ex.name}</div>
                        <div style={{ fontSize:11, color:"var(--text2)" }}>{ex.target} · {ex.goal}</div>
                      </div>
                      <span style={{ fontSize:18 }}>{ex.icon}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        }

        function LogSummary({ log, schedule }) {
          if (schedule.type === "cardio") return (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:10, textAlign:"center" }}>
                <div>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:24, color:"var(--cyan)" }}>{log.duration}</div>
                  <div style={{ fontSize:11, color:"var(--text2)" }}>นาที</div>
                </div>
                <div>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:24, color:"var(--green)" }}>{log.distance || "—"}</div>
                  <div style={{ fontSize:11, color:"var(--text2)" }}>กิโลเมตร</div>
                </div>
                <div>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:24, color:"var(--orange)" }}>{calculatePace(log.duration, log.distance)}</div>
                  <div style={{ fontSize:11, color:"var(--text2)" }}>Avg Pace</div>
                </div>
              </div>
              {log.notes && <div style={{ fontSize:12, color:"var(--text2)", borderTop:"1px solid rgba(255,255,255,0.05)", paddingTop:6, marginTop:4 }}>" {log.notes} "</div>}
            </div>
          );
          return (
            <div>{EXERCISES.map(ex => {
              const sets = log.exercises?.[ex.id];
              if (!sets || sets.every(s => !s)) return null;
              return (
                <div key={ex.id} style={{ display:"flex", justifyContent:"space-between", marginBottom:6, borderBottom:"1px solid rgba(255,255,255,0.03)", paddingBottom:4 }}>
                  <span style={{ fontSize:13 }}>{ex.icon} {ex.name}</span>
                  <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:14, color:"var(--orange)" }}>{sets.filter(Boolean).join(" / ")}</span>
                </div>
              );
            })}</div>
          );
        }

        function LogScreen({ logType, onSave, onCancel, existingLog, saving }) {
          const isCardioMode = logType === "cardio";
          const [duration, setDuration] = useState(existingLog?.type === "cardio" ? (existingLog?.duration ?? "") : "");
          const [distance, setDistance] = useState(existingLog?.type === "cardio" ? (existingLog?.distance ?? "") : "");
          const [avgHR, setAvgHR]       = useState(existingLog?.type === "cardio" ? (existingLog?.avgHR ?? "") : "");
          const [notes, setNotes]       = useState(existingLog?.type === "cardio" ? (existingLog?.notes ?? "") : "");
          const [exSets, setExSets]     = useState(() => {
            const init = {};
            const activeLog = existingLog?.type === "calisthenics" ? existingLog : null;
            EXERCISES.forEach(ex => { init[ex.id] = activeLog?.exercises?.[ex.id] ?? ["","",""]; });
            return init;
          });

          const inp = { width:"100%", background:"var(--card2)", border:"1px solid var(--border)", borderRadius:12, padding:"14px 16px", color:"#fff", fontSize:16, fontFamily:"'Barlow',sans-serif", outline:"none" };
          const hrNum = Number(avgHR);
          const hrColor = hrNum < 60 ? null : hrNum < 138 ? "var(--cyan)" : hrNum <= 150 ? "var(--green)" : "var(--danger)";
          const hrLabel = hrNum < 60 ? null : hrNum < 138 ? "⬇️ ต่ำกว่า Zone 2" : hrNum <= 150 ? "✅ อยู่ใน Zone 2!" : "⬆️ สูงเกิน Zone 2";

          const submit = () => {
            if (isCardioMode) {
              if (!duration || !avgHR) return alert("กรุณากรอกระยะเวลาและ HR");
              onSave({ type:"cardio", duration:Number(duration), distance:Number(distance), avgHR:Number(avgHR), notes });
            } else {
              onSave({ type:"calisthenics", exercises:exSets });
            }
          };

          return (
            <div style={{ padding:"0 12px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
                <button onClick={onCancel} style={{ background:"var(--card)", border:"none", color:"#fff", fontSize:18, padding:"8px 14px", borderRadius:10 }}>←</button>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:22 }}>{isCardioMode ? "🏃 บันทึก Zone 2" : "💪 บันทึก Calisthenics"}</div>
              </div>

              {isCardioMode ? (
                <>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                    <div>
                      <FLabel>ระยะเวลา (นาที)</FLabel>
                      <input style={inp} type="number" inputMode="numeric" placeholder="เช่น 30" value={duration} onChange={e => setDuration(e.target.value)} />
                    </div>
                    <div>
                      <FLabel>ระยะทาง (กิโลเมตร)</FLabel>
                      <input style={inp} type="number" step="0.01" inputMode="decimal" placeholder="เช่น 4.5" value={distance} onChange={e => setDistance(e.target.value)} />
                    </div>
                  </div>
                  <div style={{ marginTop: 8, fontSize: 12, color: "var(--cyan)", fontWeight: 600 }}>
                    💡 คำนวณความเร็วเฉลี่ย: Pace {calculatePace(duration, distance)} /กม.
                  </div>
                  <div style={{ height:14 }} />
                  <FLabel>Average Heart Rate (bpm)</FLabel>
                  <input style={inp} type="number" inputMode="numeric" placeholder="เช่น 145" value={avgHR} onChange={e => setAvgHR(e.target.value)} />
                  {hrColor && <div style={{ marginTop:8, padding:"8px 12px", background:`${hrColor}18`, borderRadius:8, border:`1px solid ${hrColor}40`, fontSize:12, color:hrColor }}>{hrLabel}</div>}
                  <div style={{ height:14 }} />
                  <FLabel>หมายเหตุ (ไม่บังคับ)</FLabel>
                  <input style={inp} placeholder="เช่น วิ่งในสวน รู้สึกดี" value={notes} onChange={e => setNotes(e.target.value)} />
                </>
              ) : (
                <>
                  <div style={{ fontSize:12, color:"var(--text2)", marginBottom:14 }}>⚡ 3 เซตต่อท่า · จัดเรียงข้อมูลโครงสร้างตารางหลังบ้านลงชีต</div>
                  {EXERCISES.map((ex, i) => (
                    <div key={ex.id} style={{ background:"var(--card)", borderRadius:16, padding:16, marginBottom:12, border:"1px solid var(--border)" }}>
                      <div style={{ display:"flex", gap:10, alignItems:"center", marginBottom:12 }}>
                        <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:20, color:"var(--orange)", width:26 }}>{i+1}</div>
                        <div>
                          <div style={{ fontWeight:700, fontSize:15 }}>{ex.icon} {ex.name}</div>
                          <div style={{ fontSize:11, color:"var(--text2)" }}>{ex.target}</div>
                        </div>
                      </div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                        {[0,1,2].map(si => (
                          <div key={si}>
                            <div style={{ fontSize:10, color:"var(--text2)", textAlign:"center", marginBottom:4 }}>เซต {si+1}</div>
                            <input style={{ ...inp, textAlign:"center", padding:"12px 4px", fontSize:20, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700 }}
                              type="number" inputMode="numeric" placeholder="—"
                              value={exSets[ex.id][si]}
                              onChange={e => { const v=[...exSets[ex.id]]; v[si]=e.target.value; setExSets(p=>({...p,[ex.id]:v})); }} />
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </>
              )}

              <button onClick={submit} disabled={saving} className={`bubble-btn ${isCardioMode ? 'bubble-btn-cardio' : 'bubble-btn-calisthenics'}`} style={{ marginTop: 20, background: saving ? "var(--card2)" : undefined, boxShadow: saving ? "none" : undefined, color: saving ? "var(--text2)" : "#fff" }}>
                {saving ? "☁️ กำลังบันทึกลง Sheets…" : "☁️ บันทึกลง Google Sheets"}
              </button>
              <div style={{ height:24 }} />
            </div>
          );
        }

        function HistoryScreen({ today, logs }) {
          const weeks = Array.from({length:4}, (_,i) =>
            Array.from({length:7}, (_,d) => { const dt=new Date(today); dt.setDate(dt.getDate()-(i*7+(6-d))); return dt; })
          );
          const streak = calcStreak(today, logs);
          const [selectedDate, setSelectedDate] = useState(null);

          const handleDateClick = (k, hasLog) => {
            if (!hasLog) return;
            setSelectedDate(selectedDate === k ? null : k);
          };

          return (
            <div style={{ padding:"0 12px" }}>
              <div style={{ display:"flex", gap:12, marginBottom:16 }}>
                <div style={{ flex:1, background:"var(--card)", border:"1px solid var(--border)", borderRadius:14, padding:"14px 16px" }}>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:26, color:"var(--orange)", lineHeight:1, marginBottom:4 }}>{streak} 🔥</div>
                  <div style={{ fontSize:11, color:"var(--text2)" }}>Streak ต่อเนื่อง</div>
                </div>
                <div style={{ flex:1, background:"var(--card)", border:"1px solid var(--border)", borderRadius:14, padding:"14px 16px" }}>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:26, color:"var(--cyan)", lineHeight:1, marginBottom:4 }}>{Object.keys(logs).length}</div>
                  <div style={{ fontSize:11, color:"var(--text2)" }}>รวม Workouts</div>
                </div>
              </div>
              
              {weeks.map((week, wi) => (
                <div key={wi} style={{ marginBottom:14, background: "var(--card)", padding: "12px", borderRadius: 16, border: "1px solid var(--border)" }}>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, color:"var(--text2)", textTransform:"uppercase", marginBottom:4 }}>
                    {wi === 0 ? "สัปดาห์นี้" : `${wi} สัปดาห์ที่แล้ว`}
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(7, minmax(0, 1fr))", gap:5, marginTop:6 }}>
                    {week.map(date => {
                      const k = date.toISOString().slice(0, 10);
                      const log = logs[k];
                      const isToday = k === dateKey(today);
                      const isFuture = date > today;
                      const dot = log ? (log.type === "cardio" ? "var(--cyan)" : "var(--orange)") : null;
                      const isSelected = selectedDate === k;
                      
                      return (
                        <div 
                          key={k} 
                          onClick={() => handleDateClick(k, !!log)}
                          style={{ 
                            background: isFuture ? "transparent" : isSelected ? `${dot}25` : log ? `${dot}10` : "#141c26", 
                            border: isSelected ? `2px solid ${dot}` : isToday ? "2px solid var(--cyan)" : "1px solid var(--border)", 
                            borderRadius:10, 
                            padding:"10px 2px", 
                            textAlign:"center", 
                            opacity: isFuture ? 0.2 : 1,
                            cursor: log ? "pointer" : "default",
                            transform: isSelected ? "scale(1.05)" : "scale(1)",
                            transition: "all 0.2s ease"
                          }}
                        >
                          <div style={{ fontSize:10, color: isSelected ? "#fff" : "var(--text2)", marginBottom:4, fontWeight: isSelected ? 700 : 500 }}>{DAYS_TH[date.getDay()]}</div>
                          <div style={{ fontSize:12, fontWeight:700, marginBottom:6, color: isSelected ? "#fff" : "#e8edf5" }}>{date.getDate()}</div>
                          <div style={{ width:7, height:7, borderRadius:"50%", background: dot || "transparent", border: !dot ? "1px solid rgba(255,255,255,0.1)" : "none", margin:"0 auto" }} />
                        </div>
                      );
                    })}
                  </div>

                  {/* กล่องรายละเอียดเมื่อกดเลือกวัน */}
                  {week.some(date => date.toISOString().slice(0, 10) === selectedDate) && (() => {
                    const currentLog = logs[selectedDate];
                    if (!currentLog) return null;
                    
                    const logDate = new Date(selectedDate);
                    const thaiFormattedDate = logDate.toLocaleDateString("th-TH", { day:"numeric", month:"long" });
                    const isCardio = currentLog.type === "cardio";
                    
                    return (
                      <div className="fade-in" style={{ marginTop: 12, padding: "12px", background: "var(--card2)", borderRadius: 12, border: `1px solid ${isCardio ? "var(--cyan)" : "var(--orange)"}30` }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, borderBottom: "1px solid rgba(255,255,255,0.05)", paddingBottom: 6 }}>
                          <span style={{ fontSize: 12, fontWeight: 700, color: "var(--text2)" }}>📋 วันที่ {thaiFormattedDate}</span>
                          <span style={{ fontSize: 11, fontWeight: 700, color: isCardio ? "var(--cyan)" : "var(--orange)", background: isCardio ? "var(--cyan)15" : "var(--orange)15", padding: "2px 8px", borderRadius: 6 }}>
                            {isCardio ? "🏃 CARDIO" : "💪 STRENGTH"}
                          </span>
                        </div>
                        
                        {isCardio ? (
                          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                              <div>
                                <div style={{ fontSize: 11, color: "var(--text2)" }}>ระยะเวลา</div>
                                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:20, color:"var(--cyan)" }}>{currentLog.duration} <span style={{fontSize:11, fontWeight:400, color:"#fff"}}>นาที</span></div>
                              </div>
                              <div>
                                <div style={{ fontSize: 11, color: "var(--text2)" }}>ระยะทาง</div>
                                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:20, color:"var(--green)" }}>{currentLog.distance || "—"} <span style={{fontSize:11, fontWeight:400, color:"#fff"}}>กม.</span></div>
                              </div>
                              <div>
                                <div style={{ fontSize: 11, color: "var(--text2)" }}>ความเร็วเฉลี่ย</div>
                                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:20, color:"var(--cyan)" }}>Pace {calculatePace(currentLog.duration, currentLog.distance)}</div>
                              </div>
                              <div>
                                <div style={{ fontSize: 11, color: "var(--text2)" }}>Heart Rate เฉลี่ย</div>
                                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:20, color: currentLog.avgHR >= 138 && currentLog.avgHR <= 150 ? "var(--green)" : "var(--danger)" }}>{currentLog.avgHR} <span style={{fontSize:11, fontWeight:400, color:"#fff"}}>bpm</span></div>
                              </div>
                            </div>
                            {currentLog.notes && (
                              <div style={{ fontSize: 12, color: "#aabbc8", fontStyle: "italic", background: "rgba(255,255,255,0.02)", padding: "6px 10px", borderRadius: 6, marginTop: 4 }}>
                                "{currentLog.notes}"
                              </div>
                            )}
                          </div>
                        ) : (
                          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                            {EXERCISES.map(ex => {
                              const sets = currentLog.exercises?.[ex.id];
                              if (!sets || sets.every(s => !s)) return null;
                              return (
                                <div key={ex.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, padding: "4px 0", borderBottom: "1px solid rgba(255,255,255,0.02)" }}>
                                  <span style={{ color: "#e8edf5" }}>{ex.icon} {ex.name}</span>
                                  <span style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, fontSize: 14, color: "var(--orange)" }}>
                                    {sets.filter(s => s !== "").join(" / ")} <span style={{fontSize:10, fontWeight:400, color:"var(--text2)"}}>reps</span>
                                  </span>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })()}
                </div>
              ))}

              <div style={{ display:"flex", gap:16, flexWrap:"wrap", marginTop:8, justifyContent:"center", background:"var(--card)", padding:"8px", borderRadius:10, border:"1px solid var(--border)" }}>
                {[["var(--cyan)","Zone 2 Cardio"],["var(--orange)","Calisthenics"],["var(--border)","ไม่มีบันทึก/วันพัก"]].map(([c,l]) => (
                  <div key={l} style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color:"var(--text2)" }}>
                    <div style={{ width:7, height:7, borderRadius:"50%", background:c }} />
                    <span>{l}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        function calcStreak(today, logs) {
          let streak=0, d=new Date(today);
          for (let i=0; i<365; i++) {
            const k=dateKey(d), sched=SCHEDULE[d.getDay()];
            if (sched.type==="rest") { d.setDate(d.getDate()-1); continue; }
            if (logs[k]) { streak++; d.setDate(d.getDate()-1); } else break;
          }
          return streak;
        }

        function InsightScreen({ logs }) {
          const [insight, setInsight] = useState(null);
          const [loading, setLoading] = useState(false);
          const [error, setError]     = useState("");

          const analyze = async () => {
            setLoading(true); setError(""); setInsight(null);
            try { setInsight(await generateInsights(logs)); }
            catch (e) {
              setError(e.message === "no_data"
                ? "ยังไม่มีข้อมูล Workout\nบันทึกอย่างน้อย 2–3 ครั้งก่อนนะครับ 💪"
                : "วิเคราะห์ไม่สำเร็จ ลองใหม่อีกครั้ง");
            }
            setLoading(false);
          };

          const gradeColor = g => !g?"var(--text2)":g[0]==="A"?"var(--green)":g[0]==="B"?"var(--cyan)":g[0]==="C"?"var(--orange)":"var(--danger)";

          return (
            <div style={{ padding:"0 12px" }}>
              <div style={{ background:"linear-gradient(135deg,#1a0d2e,#0d1a2e)", border:"1px solid #a855f740", borderRadius:20, padding:20, marginBottom:16 }}>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:22, marginBottom:4 }}>🧠 AI Progression Insights</div>
                <div style={{ fontSize:13, color:"var(--text2)", marginBottom:16 }}>วิเคราะห์ {Object.keys(logs).length} workout · หา progression และสิ่งที่ควรปรับ</div>
                <button onClick={analyze} disabled={loading} style={{ width:"100%", padding:"14px", background:loading?"var(--card2)":"linear-gradient(135deg,#a855f7,#7c3aed)", border:"none", borderRadius:12, color:loading?"var(--text2)":"#fff", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:16, letterSpacing:1, textTransform:"uppercase" }}>
                  {loading ? "🧠 กำลังวิเคราะห์…" : insight ? "🔄 วิเคราะห์ใหม่" : "✨ วิเคราะห์ผลการออกกำลังกาย"}
                </button>
              </div>

              {loading && (
                <div style={{ textAlign:"center", padding:"40px 20px" }}>
                  <div style={{ fontSize:48, marginBottom:14 }}>🧠</div>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:18, color:"var(--purple)", marginBottom:8 }}>Claude กำลังวิเคราะห์…</div>
                  <div style={{ display:"flex", gap:8, justifyContent:"center" }}>
                    {[0,1,2].map(i => <div key={i} style={{ width:8, height:8, borderRadius:"50%", background:"var(--purple)", animation:`pulse 1.2s ${i*0.2}s ease-in-out infinite` }} />)}
                  </div>
                </div>
              )}

              {error && !loading && (
                <div style={{ background:"#200a0a", border:"1px solid var(--danger)40", borderRadius:14, padding:20, textAlign:"center" }}>
                  <div style={{ fontSize:32, marginBottom:8 }}>⚠️</div>
                  <div style={{ fontSize:13, color:"var(--text2)", whiteSpace:"pre-line" }}>{error}</div>
                </div>
              )}

              {insight && !loading && (
                <div className="fade-in">
                  <div style={{ background:"var(--card)", border:"1px solid var(--border)", borderRadius:18, padding:20, marginBottom:12, display:"flex", flexDirection: "column", gap:14 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                      <div style={{ background: `${gradeColor(insight.overall?.rating)}15`, width: 64, height: 64, borderRadius: 16, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", border: `1px solid ${gradeColor(insight.overall?.rating)}40` }}>
                        <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:36, color:gradeColor(insight.overall?.rating), lineHeight:1 }}>{insight.overall?.rating}</div>
                        <div style={{ fontSize:9, color:"var(--text2)", marginTop:1 }}>GRADE</div>
                      </div>
                      <div style={{ flex: 1 }}>
                        <SecLabel>ภาพรวมประสิทธิภาพ</SecLabel>
                        <div style={{ fontSize:15, fontWeight:600, color:"#fff" }}>สรุปจาก AI Coach</div>
                      </div>
                    </div>
                    <div style={{ fontSize:14, lineHeight:1.6, color:"#c8d8e8", background: "var(--card2)", padding: "12px 14px", borderRadius: 12, border: "1px solid var(--border)" }}>
                      {insight.overall?.summary}
                    </div>
                  </div>

                  {insight.consistency && (
                    <div style={{ background:"var(--card)", border:"1px solid var(--border)", borderRadius:14, padding:16, marginBottom:12 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                        <SecLabel>🗓 ความสม่ำเสมอ</SecLabel>
                        <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:20, color:insight.consistency.score>=70?"var(--green)":insight.consistency.score>=40?"var(--orange)":"var(--danger)" }}>{insight.consistency.score}%</span>
                      </div>
                      <div style={{ height:6, background:"var(--card2)", borderRadius:3, overflow:"hidden", marginBottom:8 }}>
                        <div style={{ height:"100%", width:`${insight.consistency.score}%`, background:insight.consistency.score>=70?"var(--green)":insight.consistency.score>=40?"var(--orange)":"var(--danger)", borderRadius:3 }} />
                      </div>
                      <div style={{ fontSize:13, color:"var(--text2)", lineHeight:1.4 }}>{insight.consistency.comment}</div>
                    </div>
                  )}

                  {insight.priority && (
                    <div style={{ background:"linear-gradient(135deg,#0a1a0a,#1a1a0a)", border:"1px solid #00e67640", borderRadius:14, padding:16, marginBottom:12 }}>
                      <SecLabel>🎯 โฟกัสสำคัญที่สุดตอนนี้</SecLabel>
                      <div style={{ fontSize:15, fontWeight:600, color:"var(--green)", marginBottom:6, lineHeight:1.4 }}>{insight.priority.focus}</div>
                      <div style={{ fontSize:12, color:"var(--text2)" }}>Next milestone: {insight.priority.next_milestone}</div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        }

        function StatsScreen({ logs }) {
          const cardioLogs = Object.values(logs).filter(l => l.type === "cardio");
          const avgHR  = cardioLogs.length ? Math.round(cardioLogs.reduce((s,l)=>s+l.avgHR,0)/cardioLogs.length) : 0;
          const totalMins = cardioLogs.reduce((s,l)=>s+(l.duration||0),0);
          const totalDist = cardioLogs.reduce((s,l)=>s+(l.distance||0),0);

          return (
            <div style={{ padding:"0 12px" }}>
              <SecLabel>Zone 2 Cardio Stats</SecLabel>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:20 }}>
                <BigStat label="เซสชัน"   value={cardioLogs.length}  color="var(--cyan)" />
                <BigStat label="กิโลเมตรกรรวม"  value={totalDist.toFixed(1)||"—"}  color="var(--green)" />
                <BigStat label="นาทีรวม"  value={totalMins||"—"}     color="var(--cyan)" />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 10, textAlign: "center" }}>
                <div style={{ background: "var(--card)", padding: "14px", borderRadius: 14, border: "1px solid var(--border)" }}>
                  <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: 28, color: "var(--green)" }}>{avgHR || "—"} <span style={{fontSize: 14, fontWeight: 400, color: "var(--text2)"}}>bpm</span></div>
                  <div style={{ fontSize: 11, color: "var(--text2)", marginTop: 4 }}>Heart Rate เฉลี่ยทั้งหมด</div>
                </div>
              </div>
            </div>
          );
        }

        function SecLabel({ children }) { return <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, color:"var(--text2)", textTransform:"uppercase", marginBottom:4 }}>{children}</div>; }
        function FLabel({ children }) { return <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:600, fontSize:11, letterSpacing:2, color:"var(--text2)", textTransform:"uppercase", marginBottom:6 }}>{children}</div>; }
        
        function BigStat({ label, value, unit, color }) {
          return (
            <div style={{ background:"var(--card)", border:"1px solid var(--border)", borderRadius:14, padding:"14px 10px", textAlign:"center" }}>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:28, color, lineHeight:1 }}>{value}</div>
              {unit && <div style={{ fontSize:9, color:"var(--text2)", marginTop:2 }}>{unit}</div>}
              <div style={{ fontSize:10, color:"var(--text2)", marginTop:4 }}>{label}</div>
            </div>
          );
        }

        // Render แอปพลิเคชันหลัก
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
