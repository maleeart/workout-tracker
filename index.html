<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calisthenics & Zone 2 Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ─── Google Sheets Config ─────────────────────────────────────────────────────
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbxfdQRGQgDzOGwrAHNLXKv7cWL_Rd3DLgy9Dd-e2fGbasL8lkSL5FSmWW7cIgt-HhI/exec";

        // ระบบโหลดข้อมูลจาก Cache หรือ Server (PWA Mode)
        async function sheetLoad() {
          try {
            const res = await fetch(`${SHEET_URL}?action=load`);
            if (!res.ok) throw new Error("fetch_failed");
            const data = await res.json();
            if (data?.logs) {
              localStorage.setItem("workout_logs_cache", JSON.stringify(data));
              return data;
            }
            return { logs: {} };
          } catch (e) { 
            const cache = localStorage.getItem("workout_logs_cache");
            return cache ? JSON.parse(cache) : null; 
          }
        }

        async function sheetSave(allData) {
          localStorage.setItem("workout_logs_cache", JSON.stringify(allData)); // บันทึกลงเครื่องทันทีก่อนเผื่อเน็ตหลุด
          const encoded = encodeURIComponent(JSON.stringify(allData));
          const res = await fetch(`${SHEET_URL}?action=save&data=${encoded}`);
          if (!res.ok) throw new Error("save_failed");
        }

        // ─── Data & Schedule ──────────────────────────────────────────────────────────
        const SCHEDULE = {
          0: { type: "rest",         label: "Rest",              sub: "Full Recovery 😴" },
          1: { type: "cardio",       label: "Zone 2 Cardio",     sub: "25–35 min / HR 138–150" },
          2: { type: "calisthenics", label: "Full Body Strength", sub: "Routine A" },
          3: { type: "cardio",       label: "Zone 2 Cardio",     sub: "25–35 min / HR 138–150" },
          4: { type: "calisthenics", label: "Full Body Strength", sub: "Routine A" },
          5: { type: "cardio",       label: "Zone 2 Cardio",     sub: "25–35 min / HR 138–150" },
          6: { type: "calisthenics", label: "Full Body Strength", sub: "Routine A" },
        };

        const EXERCISES = [
          { id: "aus_pull",   name: "Australian Pull-Ups",   icon: "🏋️", target: "Max Reps" },
          { id: "neg_pull",   name: "Negative Pull-Ups",     icon: "⬇️", target: "3–5 reps" },
          { id: "dec_push",   name: "Decline Push-Ups",      icon: "💪", target: "Max Reps" },
          { id: "pike_push",  name: "Incline Pike Push-Ups", icon: "🔺", target: "8–10 reps" },
          { id: "knee_raise", name: "Hanging Knee Raises",   icon: "🦵", target: "10–12 reps" },
          { id: "squats",     name: "Bodyweight Squats",     icon: "🦴", target: "15–20 reps" },
        ];

        const DAYS_TH = ["อา","จ","อ","พ","พฤ","ศ","ส"];
        function dateKey(d = new Date()) { return d.toISOString().slice(0, 10); }

        // Helper คำนวณความเร็ว Pace จากวินาทีต่อกิโลเมตร
        function calculatePaceStr(minutes, distance) {
          if (!minutes || !distance || distance <= 0) return "—";
          const totalSeconds = minutes * 60;
          const secondsPerKm = totalSeconds / distance;
          const paceMin = Math.floor(secondsPerKm / 60);
          const paceSec = Math.round(secondsPerKm % 60);
          return `${paceMin}:${paceSec < 10 ? '0' : ''}${paceSec}`;
        }

        // ─── Styles ───────────────────────────────────────────────────────────────────
        const css = `
          @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
          * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
          body { background: #080c14; color: #e8edf5; font-family: 'Barlow', sans-serif; width: 100%; min-height: 100vh; overflow-x: hidden; }
          :root {
            --cyan:#00d4ff; --orange:#ff6b2b; --green:#00e676; --purple:#a855f7; --danger:#ff4757;
            --card:#101824; --card2:#141e2c; --border:rgba(255,255,255,0.07); --text2:#7a8fa8;
          }
          input:focus { outline: 2px solid var(--cyan) !important; }
          @keyframes spin    { to { transform: rotate(360deg); } }
          @keyframes pulse   { 0%,100%{opacity:0.3} 50%{opacity:1} }
          @keyframes fadeIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
          .fade-in { animation: fadeIn 0.35s ease forwards; }
          .ios-container { padding-top: env(safe-area-inset-top, 24px); padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 80px); width: 100%; max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
          button { cursor: pointer; touch-action: manipulation; }
          .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(10, 16, 32, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom, 12px); z-index: 999; }
          .quick-btn { background: var(--card2); border: 1px solid var(--border); color: #fff; width: 36 ... height: 36px; border-radius: 8px; font-weight: bold; font-size: 18px; display: flex; alignItems: center; justifyContent: center; }
        `;

        // ─── App ──────────────────────────────────────────────────────────────────────
        function App() {
          const [tab, setTab]           = useState("today");
          const [allData, setAllData]   = useState({ logs: {} });
          const [syncStatus, setSyncStatus] = useState("loading");
          const [toast, setToast]       = useState("");
          const [logging, setLogging]   = useState(false);
          const [showZoneCalc, setShowZoneCalc] = useState(false);

          const today    = new Date();
          const todayKey = dateKey(today);
          const schedule = SCHEDULE[today.getDay()];
          const todayLog = allData.logs[todayKey] || null;

          useEffect(() => {
            (async () => {
              setSyncStatus("loading");
              const data = await sheetLoad();
              if (data) { setAllData(data); setSyncStatus("ready"); }
              else { setSyncStatus("error"); showToast("⚠️ ออฟไลน์โหมด (ใช้ข้อมูลในเครื่อง)", true); }
            })();
          }, []);

          const showToast = (msg, isError = false) => {
            setToast({ msg, isError });
            setTimeout(() => setToast(""), 3500);
          };

          const handleSaveLog = async (logData) => {
            const updated = { ...allData, logs: { ...allData.logs, [todayKey]: logData } };
            setAllData(updated);
            setLogging(false);
            setSyncStatus("saving");
            try {
              await sheetSave(updated);
              setSyncStatus("ready");
              showToast("✅ บันทึกอัปเดตลงเครื่องและกูเกิ้ลชีตแล้ว");
            } catch {
              setSyncStatus("error");
              showToast("⚠️ เน็ตหลุด! ข้อมูลเซฟเก็บในเครื่องให้แล้วชั่วคราว", true);
            }
          };

          const TABS = [["today","📅","วันนี้"],["history","📊","ประวัติ"],["stats","🏆","สถิติ"]];

          return (
            <>
              <style>{css}</style>
              <div className="ios-container">

                {/* Header */}
                <div style={{ padding: "16px 16px 12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 11, letterSpacing: 3, color: "var(--cyan)" }}>TRAINING TRACKER PRO</div>
                    <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 24 }}>Calisthenics & Zone 2</div>
                  </div>
                  <SyncBadge status={syncStatus} />
                </div>

                {toast && (
                  <div style={{ margin: "0 16px 12px", padding: "12px 14px", background: toast.isError ? "#200a0a" : "#001a0e", border: `1px solid ${toast.isError ? "var(--danger)" : "var(--green)"}50`, borderRadius: 12, fontSize: 13, color: toast.isError ? "var(--danger)" : "var(--green)" }}>
                    {toast.msg}
                  </div>
                )}

                {/* Content */}
                <div style={{ flex: 1 }}>
                  {syncStatus === "loading" ? <LoadingScreen /> :
                   logging ? <LogScreen schedule={schedule} onSave={handleSaveLog} onCancel={() => setLogging(false)} existingLog={todayLog} saving={syncStatus === "saving"} /> :
                   tab === "today"   ? <TodayScreen schedule={schedule} today={today} todayLog={todayLog} onLog={() => setLogging(true)} onOpenCalc={() => setShowZoneCalc(true)} /> :
                   tab === "history" ? <HistoryScreen today={today} logs={allData.logs} /> :
                                       <StatsScreen logs={allData.logs} />}
                </div>

                {/* โมดอลคำนวณ Zone 2 */}
                {showZoneCalc && <ZoneCalculator onClose={() => setShowZoneCalc(false)} />}

                {/* Bottom Nav */}
                {!logging && (
                  <div className="bottom-nav">
                    {TABS.map(([id, icon, label]) => (
                      <button key={id} onClick={() => setTab(id)} style={{ flex: 1, padding: "12px 0 8px", background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                        <span style={{ fontSize: 20 }}>{icon}</span>
                        <span style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 11, fontWeight: 700, color: tab === id ? "var(--cyan)" : "var(--text2)" }}>{label}</span>
                        {tab === id && <div style={{ width: 16, height: 2, background: "var(--cyan)", borderRadius: 1 }} />}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </>
          );
        }

        // ─── หน้าจอวันนี้ (Today) ───────────────────────────────────────────────────
        function TodayScreen({ schedule, today, todayLog, onLog, onOpenCalc }) {
          const dayName = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"][today.getDay()];
          const dateStr = today.toLocaleDateString("th-TH", { day:"numeric", month:"long", year:"numeric" });
          const tc = schedule.type === "cardio" ? "var(--cyan)" : schedule.type === "calisthenics" ? "var(--orange)" : "var(--text2)";
          const ti = schedule.type === "cardio" ? "🏃" : schedule.type === "calisthenics" ? "💪" : "😴";

          return (
            <div style={{ padding: "0 16px" }}>
              <div style={{ background:"var(--card)", borderRadius:20, padding:20, marginBottom:14, border:"1px solid var(--border)", position:"relative" }}>
                <div style={{ fontSize:12, color:"var(--text2)", marginBottom:4 }}>{dateStr}</div>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:28, marginBottom:10 }}>วัน{dayName}</div>
                <div style={{ display:"inline-flex", alignItems:"center", gap:8, background:`${tc}15`, border:`1px solid ${tc}40`, borderRadius:100, padding:"6px 14px", marginBottom: 12 }}>
                  <span style={{ color:tc, fontWeight:"bold" }}>{ti} {schedule.label}</span>
                </div>
                <div style={{ fontSize:13, color:"var(--text2)" }}>{schedule.sub}</div>
              </div>

              {schedule.type === "cardio" && (
                <button onClick={onOpenCalc} style={{ width:"100%", padding:"10px", background:"#1a102f", border:"1px solid var(--purple)40", borderRadius:12, color:"var(--purple)", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:13, marginBottom:14 }}>
                  ⚙️ คำนวณช่วง HEART RATE ZONE 2 เฉพาะบุคคล
                </button>
              )}

              {todayLog ? (
                <div style={{ background:"#001a0e", border:"1px solid #00e67640", borderRadius:16, padding:16, marginBottom:14 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:"var(--green)" }} />
                    <span style={{ fontWeight:"bold", color:"var(--green)", fontSize:14 }}>✓ บันทึกสำเร็จแล้ว</span>
                  </div>
                  <LogSummary log={todayLog} schedule={schedule} />
                  <button onClick={onLog} style={{ marginTop:14, width:"100%", padding:"10px", background:"transparent", border:"1px solid var(--border)", borderRadius:10, color:"var(--text2)", fontSize:13 }}>แก้ไขข้อมูล</button>
                </div>
              ) : schedule.type !== "rest" ? (
                <button onClick={onLog} style={{ width:"100%", padding:"18px", background:`linear-gradient(135deg,${tc},${tc}88)`, border:"none", borderRadius:16, color: schedule.type === "cardio" ? "#000" : "#fff", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:18, letterSpacing:1, boxShadow:`0 8px 24px ${tc}25` }}>
                  บันทึกกิจกรรม {schedule.type === "cardio" ? "CARDIO" : "STRENGTH"}
                </button>
              ) : (
                <div style={{ textAlign:"center", padding:"40px 0", color:"var(--text2)" }}>😴 พักผ่อนเต็มที่เพื่อคืนความฟิต</div>
              )}
            </div>
          );
        }

        // ─── หน้าจอบันทึกผล (Log Input) + ปุ่ม Quick Fill ────────────────────────────
        function LogScreen({ schedule, onSave, onCancel, existingLog, saving }) {
          const [duration, setDuration] = useState(existingLog?.duration ?? "");
          const [avgHR, setAvgHR]       = useState(existingLog?.avgHR ?? "");
          const [distance, setDistance] = useState(existingLog?.distance ?? "");
          const [notes, setNotes]       = useState(existingLog?.notes ?? "");
          const [exSets, setExSets]     = useState(() => {
            const init = {};
            EXERCISES.forEach(ex => { init[ex.id] = existingLog?.exercises?.[ex.id] ?? ["","",""]; });
            return init;
          });

          const calculatedPace = calculatePaceStr(Number(duration), Number(distance));

          const submit = () => {
            if (schedule.type === "cardio") {
              if (!duration || !avgHR) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
              onSave({ type:"cardio", duration:Number(duration), avgHR:Number(avgHR), distance:Number(distance)||0, pace:calculatedPace, notes });
            } else {
              onSave({ type:"calisthenics", exercises:exSets });
            }
          };

          const adjustRep = (exId, si, amount) => {
            const currentVal = Number(exSets[exId][si]) || 0;
            const newVal = Math.max(0, currentVal + amount);
            const updated = [...exSets[exId]];
            updated[si] = newVal === 0 ? "" : String(newVal);
            setExSets(prev => ({ ...prev, [exId]: updated }));
          };

          const inpStyle = { width:"100%", background:"var(--card2)", border:"1px solid var(--border)", borderRadius:12, padding:"14px", color:"#fff", fontSize:16, outline:"none" };

          return (
            <div style={{ padding:"0 16px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
                <button onClick={onCancel} style={{ background:"var(--card)", border:"none", color:"#fff", padding:"8px 14px", borderRadius:10 }}>← กลับ</button>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:22 }}>กรอกบันทึกข้อมูล</div>
              </div>

              {schedule.type === "cardio" ? (
                <>
                  <FLabel>ระยะเวลา (นาที)</FLabel>
                  <input style={inpStyle} type="number" inputMode="numeric" placeholder="เช่น 30" value={duration} onChange={e => setDuration(e.target.value)} />
                  <div style={{ height:12 }} />
                  
                  <FLabel>ระยะทาง (กิโลเมตร)</FLabel>
                  <input style={inpStyle} type="number" step="0.01" inputMode="decimal" placeholder="เช่น 4.25" value={distance} onChange={e => setDistance(e.target.value)} />
                  {Number(duration) > 0 && Number(distance) > 0 && (
                    <div style={{ marginTop:6, fontSize:13, color:"var(--cyan)", fontWeight:"500" }}>⚡ คำนวณความเร็ว Pace อัตโนมัติ: {calculatedPace} /km</div>
                  )}
                  <div style={{ height:12 }} />

                  <FLabel>Average Heart Rate (bpm)</FLabel>
                  <input style={inpStyle} type="number" inputMode="numeric" placeholder="เช่น 142" value={avgHR} onChange={e => setAvgHR(e.target.value)} />
                  <div style={{ height:12 }} />

                  <FLabel>บันทึกช่วยจำ</FLabel>
                  <input style={inpStyle} placeholder="ความรู้สึก หรือสถานที่วิ่ง..." value={notes} onChange={e => setNotes(e.target.value)} />
                </>
              ) : (
                <>
                  <div style={{ fontSize:12, color:"var(--text2)", marginBottom:14 }}>⚡ กดปุ่ม - / + เพื่อบันทึกจำนวนเซตได้อย่างรวดเร็ว</div>
                  {EXERCISES.map((ex, i) => (
                    <div key={ex.id} style={{ background:"var(--card)", borderRadius:16, padding:16, marginBottom:12, border:"1px solid var(--border)" }}>
                      <div style={{ fontSize:14, fontWeight:700, marginBottom:12 }}>{ex.icon} {ex.name} <span style={{ fontSize:11, color:"var(--text2)", fontWeight:"normal" }}>({ex.target})</span></div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
                        {[0,1,2].map(si => (
                          <div key={si} style={{ textAlign:"center", background:"rgba(0,0,0,0.15)", padding:"8px", borderRadius:10 }}>
                            <div style={{ fontSize:10, color:"var(--text2)", marginBottom:4 }}>เซต {si+1}</div>
                            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
                              <button onClick={() => adjustRep(ex.id, si, -1)} style={{ width:24, height:24, background:"rgba(255,255,255,0.05)", border:"none", borderRadius:4, color:"#fff" }}>-</button>
                              <span style={{ fontSize:18, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, minWidth:24 }}>{exSets[ex.id][si] || "—"}</span>
                              <button onClick={() => adjustRep(ex.id, si, 1)} style={{ width:24, height:24, background:"rgba(255,255,255,0.05)", border:"none", borderRadius:4, color:"#fff" }}>+</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </>
              )}

              <button onClick={submit} disabled={saving} style={{ marginTop:16, width:"100%", padding:"16px", background:"linear-gradient(135deg,var(--orange),#ff3f00)", border:"none", borderRadius:14, color:"#fff", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:16 }}>
                {saving ? "☁️ กำลังซิงค์เข้า Google Sheets…" : "☁️ บันทึกลงระบบ"}
              </button>
            </div>
          );
        }

        // ─── กล่องแสดงผลหน้าประวัติ (Log Summary) ───────────────────────────────────
        function LogSummary({ log, schedule }) {
          if (log.type === "cardio") return (
            <div style={{ display:"flex", gap:16, flexWrap: "wrap" }}>
              <div>
                <div style={{ fontSize:22, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, color:"var(--cyan)" }}>{log.duration}</div>
                <div style={{ fontSize:10, color:"var(--text2)" }}>นาที</div>
              </div>
              <div>
                <div style={{ fontSize:22, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, color:"var(--green)" }}>{log.distance || "—"}</div>
                <div style={{ fontSize:10, color:"var(--text2)" }}>กิโลเมตร</div>
              </div>
              <div>
                <div style={{ fontSize:22, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, color:"#fff" }}>{log.pace || "—"}</div>
                <div style={{ fontSize:10, color:"var(--text2)" }}>Pace</div>
              </div>
              <div>
                <div style={{ fontSize:22, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, color:"var(--orange)" }}>{log.avgHR}</div>
                <div style={{ fontSize:10, color:"var(--text2)" }}>Heart Rate</div>
              </div>
            </div>
          );
          return (
            <div>{EXERCISES.map(ex => {
              const sets = log.exercises?.[ex.id];
              if (!sets || sets.every(s => !s)) return null;
              return (
                <div key={ex.id} style={{ display:"flex", justifyContent:"space-between", marginBottom:4, fontSize:13 }}>
                  <span style={{ color:"#c8d8e8" }}>{ex.icon} {ex.name}</span>
                  <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, color:"var(--orange)" }}>{sets.filter(Boolean).join(" / ")}</span>
                </div>
              );
            })}</div>
          );
        }

        // ─── หน้าจอประวัติ (History) แบบ Grid Responsive ───────────────────────────
        function HistoryScreen({ today, logs }) {
          const weeks = Array.from({length:3}, (_,i) =>
            Array.from({length:7}, (_,d) => { const dt=new Date(today); dt.setDate(dt.getDate()-(i*7+(6-d))); return dt; })
          );

          return (
            <div style={{ padding:"0 16px" }}>
              <SecLabel>ประวัติกิจกรรม 3 สัปดาห์ล่าสุด</SecLabel>
              {weeks.map((week, wi) => (
                <div key={wi} style={{ marginBottom:14, background: "var(--card)", padding: "12px", borderRadius: 16, border: "1px solid var(--border)" }}>
                  <div style={{ fontSize:11, color:"var(--text2)", fontWeight:"bold" }}>{wi === 0 ? "สัปดาห์นี้" : `${wi} สัปดาห์ที่แล้ว`}</div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(7, minmax(0, 1fr))", gap:5, marginTop:8 }}>
                    {week.map(date => {
                      const k=dateKey(date), log=logs[k];
                      const isToday=k===dateKey(today), isFuture=date>today;
                      const clr=log?(log.type==="cardio"?"var(--cyan)":"var(--orange)"):null;
                      return (
                        <div key={k} style={{ background:isFuture?"transparent":log?`${clr}12`:"#141c26", border:isToday?"2px solid var(--cyan)":"1px solid var(--border)", borderRadius:8, padding:"8px 2px", textAlign:"center", opacity:isFuture?0.15:1 }}>
                          <div style={{ fontSize:9, color:"var(--text2)", marginBottom:2 }}>{DAYS_TH[date.getDay()]}</div>
                          <div style={{ fontSize:12, fontWeight:700, marginBottom:4 }}>{date.getDate()}</div>
                          <div style={{ width:6, height:6, borderRadius:"50%", background:clr||"transparent", margin:"0 auto" }} />
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          );
        }

        // ─── หน้าจอรวมสถิติ (Stats) ─────────────────────────────────────────────────
        function StatsScreen({ logs }) {
          const cardioLogs = Object.values(logs).filter(l => l.type === "cardio");
          const totalMins = cardioLogs.reduce((s,l)=>s+(l.duration||0),0);
          const totalKm = cardioLogs.reduce((s,l)=>s+(l.distance||0),0).toFixed(1);

          return (
            <div style={{ padding:"0 16px" }}>
              <SecLabel>ภาพรวมสถิติสายคาร์ดิโอ</SecLabel>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
                <BigStat label="เวลาวิ่งรวม (นาที)" value={totalMins} color="var(--cyan)" />
                <BigStat label="ระยะทางรวม (กม.)" value={totalKm} color="var(--green)" />
              </div>
              <div style={{ background: "var(--card)", padding:16, borderRadius:14, border:"1px solid var(--border)", fontSize:13, color:"var(--text2)", lineHeight:1.5 }}>
                💡 ข้อมูลของพี่จะถูกบันทึกแยกแถวอย่างเป็นระเบียบลงใน Google Sheets เรียบร้อย สามารถนำไปสร้างแผนภูมิวิเคราะห์ความฟิตต่อบนหน้าคอมพิวเตอร์ได้ทันทีครับ!
              </div>
            </div>
          );
        }

        // ─── ระบบช่วยคำนวณช่วงอัตราการเต้นหัวใจ Zone 2 (Karvonen Formula) ───────────
        function ZoneCalculator({ onClose }) {
          const [age, setAge] = useState("30"); // ตั้งค่าเริ่มต้นตามอายุผู้ใช้งานหลัก เพื่อความสะดวกรวดเร็ว
          const [restingHr, setRestingHr] = useState("65");
          const [result, setResult] = useState(null);

          const calculate = () => {
            const a = Number(age), r = Number(restingHr);
            if (!a || !r) return alert("กรุณากรอกข้อมูลตัวเลขให้ครบถ้วน");
            
            // สูตรคำนวณอัตราการเต้นหัวใจสูงสุดแบบแม่นยำ (Gellish Formula)
            const maxHR = Math.round(207 - (0.7 * a));
            const hrr = maxHR - r; // Heart Rate Reserve
            
            // ช่วงความเข้มข้นสําหรับสร้างฐานแอโรบิก Zone 2 (60% - 70% HRR)
            const lowZone = Math.round((hrr * 0.60) + r);
            const highZone = Math.round((hrr * 0.70) + r);
            
            setResult({ maxHR, lowZone, highZone });
          };

          return (
            <div style={{ position:"fixed", top:0, left:0, width:"100vw", height:"100vh", background:"rgba(0,0,0,0.8)", backdropFilter:"blur(8px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:9999, padding:16 }}>
              <div style={{ background:"#121a28", border:"1px solid var(--border)", borderRadius:20, padding:20, width:"100%", maxWidth:380 }}>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:20, color:"var(--purple)", marginBottom:14 }}>⚙️ คำนวณช่วง Zone 2 (Karvonen)</div>
                
                <FLabel>อายุ (ปี)</FLabel>
                <input style={{ width:"100%", background:"#0c121c", border:"1px solid var(--border)", borderRadius:10, padding:10, color:"#fff", marginBottom:10 }} type="number" value={age} onChange={e => setAge(e.target.value)} />
                
                <FLabel>Resting HR (ชีพจรขณะพักขณะตื่นนอนใหม่ ๆ - bpm)</FLabel>
                <input style={{ width:"100%", background:"#0c121c", border:"1px solid var(--border)", borderRadius:10, padding:10, color:"#fff", marginBottom:16 }} type="number" placeholder="เช่น 60" value={restingHr} onChange={e => setRestingHr(e.target.value)} />

                <button onClick={calculate} style={{ width:"100%", padding:12, background:"var(--purple)", border:"none", borderRadius:10, color:"#fff", fontWeight:"bold", marginBottom:12 }}>คำนวณผลลัพธ์</button>

                {result && (
                  <div style={{ background:"#1a122c", padding:12, borderRadius:12, border:"1px solid var(--purple)40", marginBottom:14, fontSize:13 }}>
                    <div style={{ marginBottom:4 }}>Max HR ประมาณการ: <span style={{ fontWeight:"bold", color:"#fff" }}>{result.maxHR} bpm</span></div>
                    <div style={{ fontSize:15, fontWeight:"bold", color:"var(--cyan)" }}>🎯 ช่วงหัวใจโซน 2 ของคุณคือ: {result.lowZone} – {result.highZone} bpm</div>
                  </div>
                )}

                <button onClick={onClose} style={{ width:"100%", padding:10, background:"transparent", border:"1px solid var(--border)", borderRadius:10, color:"var(--text2)" }}>ปิดหน้าต่าง</button>
              </div>
            </div>
          );
        }

        // Shared Mini Components
        function SyncBadge({ status }) {
          const map = { loading: ["#f0a500", "⟳"], ready: ["var(--green)", "☁️"], saving: ["var(--cyan)", "⟳"], error: ["var(--danger)", "✕"] };
          const [color, icon] = map[status] || map.error;
          return <div style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color, background:`${color}15`, padding:"4px 10px", borderRadius:20, border:`1px solid ${color}30` }}><span style={{ animation: (status==="loading"||status==="saving") ? "spin 1s linear infinite" : "none", display:"inline-block" }}>{icon}</span></div>;
        }
        function SecLabel({ children }) { return <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, color:"var(--text2)", textTransform:"uppercase", marginBottom:8 }}>{children}</div>; }
        function FLabel({ children }) { return <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:600, fontSize:11, letterSpacing:1, color:"var(--text2)", textTransform:"uppercase", marginBottom:4 }}>{children}</div>; }
        function BigStat({ label, value, color }) { return <div style={{ background:"var(--card)", border:"1px solid var(--border)", borderRadius:14, padding:14, textAlign:"center" }}><div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:28, color, lineHeight:1, marginBottom:4 }}>{value}</div><div style={{ fontSize:11, color:"var(--text2)" }}>{label}</div></div>; }
        function StatCard({ label, value, color }) { return <div style={{ flex:1, background:"var(--card)", border:"1px solid var(--border)", borderRadius:14, padding:12 }}><div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:22, color }}>{value}</div><div style={{ fontSize:11, color:"var(--text2)" }}>{label}</div></div>; }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
