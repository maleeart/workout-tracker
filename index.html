<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calisthenics & Zone 2</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ─── Google Sheets Config ─────────────────────────────────────────────────────
        // ⚠️ เอาลิงก์ที่ได้จากการ Deploy Apps Script รอบล่าสุดมาวางแทนที่ลิงก์ด้านล่างนี้เป๊ะๆ ครับ
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbxFhNDUOLEDW6IIfGm9VYZWZSpnN9RHCRaCnddAEiOF6Yk3qlieWG9x0_CiFs-L5B4e/exec";

        async function sheetLoad() {
          try {
            const res = await fetch(SHEET_URL);
            if (!res.ok) throw new Error("fetch_failed");
            const data = await res.json();
            return data?.logs ? data : { logs: {} };
          } catch { return null; }
        }

        async function sheetSave(allData) {
          const encoded = encodeURIComponent(JSON.stringify(allData));
          const res = await fetch(`${SHEET_URL}?action=save&data=${encoded}`);
          if (!res.ok) throw new Error("save_failed");
        }

        // ─── Data ─────────────────────────────────────────────────────────────────────
        const SCHEDULE = {
          0: { type: "rest",         label: "Rest",              sub: "Full Recovery 😴" },
          1: { type: "cardio",       label: "Zone 2 Cardio",     sub: "25–35 min / HR 138–150" },
          2: { type: "calisthenics", label: "Full Body Strength", sub: "Routine A" },
          3: { type: "cardio",       label: "Zone 2 Cardio",     sub: "25–35 min / HR 138–150" },
          4: { type: "calisthenics", label: "Full Body Strength", sub: "Routine A" },
          5: { type: "cardio",       label: "Zone 2 Cardio",     sub: "25–35 min / HR 138–150" },
          6: { type: "calisthenics", label: "Full Body Strength", sub: "Routine A" },
        };

        const EXERCISES = [
          { id: "aus_pull",   name: "Australian Pull-Ups",   icon: "🏋️", target: "Max Reps",   goal: "Build pulling base" },
          { id: "neg_pull",   name: "Negative Pull-Ups",     icon: "⬇️", target: "3–5 reps",   goal: "3–5 sec slow eccentric" },
          { id: "dec_push",   name: "Decline Push-Ups",      icon: "💪", target: "Max Reps",   goal: "Upper chest & shoulder" },
          { id: "pike_push",  name: "Incline Pike Push-Ups", icon: "🔺", target: "8–10 reps",  goal: "Handstand / Overhead base" },
          { id: "knee_raise", name: "Hanging Knee Raises",   icon: "🦵", target: "10–12 reps", goal: "Core compression for L-sit" },
          { id: "squats",     name: "Bodyweight Squats",     icon: "🦴", target: "15–20 reps", goal: "Leg endurance" },
        ];

        const DAYS_TH = ["อา","จ","อ","พ","พฤ","ศ","ส"];
        function dateKey(d = new Date()) { return d.toISOString().slice(0, 10); }

        function calculatePace(duration, distance) {
          if (!duration || !distance || Number(distance) === 0) return "—";
          const totalSeconds = (Number(duration) * 60) / Number(distance);
          const paceMinutes = Math.floor(totalSeconds / 60);
          const paceSeconds = Math.round(totalSeconds % 60);
          return `${paceMinutes}:${paceSeconds < 10 ? '0' : ''}${paceSeconds}`;
        }

        // ─── AI Insight ───────────────────────────────────────────────────────────────
        async function generateInsights(logs) {
          const entries = Object.entries(logs).sort(([a],[b]) => a.localeCompare(b));
          if (entries.length === 0) throw new Error("no_data");

          const cardioEntries = entries
            .filter(([,v]) => v.type === "cardio")
            .map(([date,v]) => ({ date, duration: v.duration, distance: v.distance || 0, pace: calculatePace(v.duration, v.distance), avgHR: v.avgHR, notes: v.notes || "" }));

          const calsEntries = entries
            .filter(([,v]) => v.type === "calisthenics")
            .map(([date,v]) => ({
              date,
              exercises: EXERCISES.map(ex => ({
                name: ex.name,
                sets: (v.exercises?.[ex.id] || []).map(Number).filter(Boolean)
              }))
            }));

          const prompt = `You are a calisthenics and Zone 2 cardio coach. Analyze this athlete's workout data and provide concise, actionable insights in Thai language. Respond ONLY with a JSON object.`;

          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1500,
              messages: [{ role: "user", content: prompt }]
            })
          });
          if (!res.ok) throw new Error("api_error");
          const data = await res.json();
          return JSON.parse(data.content[0].text);
        }

        // ─── Styles ───────────────────────────────────────────────────────────────────
        const css = `
          @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
          * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
          
          body { 
            background: #080c14; 
            color: #e8edf5; 
            font-family: 'Barlow', sans-serif; 
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
          }
          
          :root {
            --cyan:#00d4ff; --orange:#ff6b2b; --green:#00e676; --purple:#a855f7; --danger:#ff4757;
            --card:#101824; --card2:#141e2c; --border:rgba(255,255,255,0.07); --text2:#7a8fa8;
          }
          
          input:focus { outline: 2px solid var(--cyan) !important; }
          @keyframes spin    { to { transform: rotate(360deg); } }
          @keyframes pulse   { 0%,100%{opacity:0.3} 50%{opacity:1} }
          @keyframes fadeIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
          .fade-in { animation: fadeIn 0.35s ease forwards; }
          
          .ios-container { 
            padding-top: env(safe-area-inset-top, 24px); 
            padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 75px);
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            position: relative;
          }
          
          button { cursor: pointer; touch-action: manipulation; }
          
          .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: rgba(10, 16, 32, 0.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            display: flex;
            padding-bottom: env(safe-area-inset-bottom, 12px);
            z-index: 999;
          }

          .bubble-btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 100px;
            color: #ffffff;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 950;
            font-size: 17px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
          }

          .bubble-btn:active {
            transform: scale(0.96);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4) !important;
          }

          .bubble-btn::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 5%;
            width: 90%;
            height: 35%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0) 100%);
            border-radius: 50px 50px 20px 20px;
            pointer-events: none;
          }

          .bubble-btn-cardio {
            background: linear-gradient(135deg, #00d4ff 0%, #008cb3 100%);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.35), inset 0 -4px 8px rgba(0,0,0,0.2);
          }

          .bubble-btn-calisthenics {
            background: linear-gradient(135deg, #ff6b2b 0%, #cc3f00 100%);
            box-shadow: 0 8px 24px rgba(255, 107, 43, 0.35), inset 0 -4px 8px rgba(0,0,0,0.2);
          }
        `;

        // ─── App ──────────────────────────────────────────────────────────────────────
        function App() {
          const [tab, setTab]           = useState("today");
          const [allData, setAllData]   = useState({ logs: {} });
          const [syncStatus, setSyncStatus] = useState("loading");
          const [toast, setToast]       = useState("");
          const [logging, setLogging]   = useState(false);
          const [logType, setLogType]   = useState("cardio");

          const today    = new Date();
          const todayKey = dateKey(today);
          const schedule = SCHEDULE[today.getDay()];
          const todayLog = allData.logs[todayKey] || null;

          useEffect(() => {
            (async () => {
              setSyncStatus("loading");
              const data = await sheetLoad();
              if (data) { setAllData(data); setSyncStatus("ready"); }
              else { setSyncStatus("error"); showToast("⚠️ โหลดไม่สำเร็จ", true); }
            })();
          }, []);

          const showToast = (msg, isError = false) => {
            setToast({ msg, isError });
            setTimeout(() => setToast(""), 3500);
          };

          const handleSaveLog = async (logData) => {
            const currentDayObj = allData.logs[todayKey] || {};
            let updatedDayObj = {};

            if (logData.type === "cardio") {
              updatedDayObj = { ...currentDayObj, type: "cardio", duration: logData.duration, distance: logData.distance, avgHR: logData.avgHR, notes: logData.notes };
            } else {
              updatedDayObj = { ...currentDayObj, type: "calisthenics", exercises: logData.exercises };
            }

            const updated = { ...allData, logs: { ...allData.logs, [todayKey]: updatedDayObj } };
            setAllData(updated);
            setLogging(false);
            setSyncStatus("saving");
            try {
              await sheetSave(updated);
              setSyncStatus("ready");
              showToast("✅ บันทึกสำเร็จ");
            } catch {
              setSyncStatus("error");
              showToast("⚠️ บันทึกไม่สำเร็จ", true);
            }
          };

          const openLogScreen = (type) => {
            setLogType(type);
            setLogging(true);
          };

          const TABS = [["today","📅","วันนี้"],["history","📊","ประวัติ"],["insight","🧠","Insight"],["stats","🏆","สถิติ"]];

          return (
            <>
              <style>{css}</style>
              <div className="ios-container">

                <div style={{ padding: "16px 16px 12px", background: "linear-gradient(180deg,#0d1520,transparent)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 24 }}>Calisthenics & Zone 2</div>
                  <SyncBadge status={syncStatus} />
                </div>

                {toast && (
                  <div style={{ margin: "0 16px 12px", padding: "12px 14px", background: toast.isError ? "#200a0a" : "#001a0e", border: `1px solid ${toast.isError ? "var(--danger)" : "var(--green)"}50`, borderRadius: 12, fontSize: 13, color: toast.isError ? "var(--danger)" : "var(--green)" }}>
                    {toast.msg}
                  </div>
                )}

                <div style={{ flex: 1, padding: "0 4px" }}>
                  {syncStatus === "loading" ? <LoadingScreen /> :
                   logging ? <LogScreen logType={logType} onSave={handleSaveLog} onCancel={() => setLogging(false)} existingLog={todayLog} saving={syncStatus === "saving"} /> :
                   tab === "today"   ? <TodayScreen schedule={schedule} today={today} todayLog={todayLog} onLogCardio={() => openLogScreen("cardio")} onLogCals={() => openLogScreen("calisthenics")} /> :
                   tab === "history" ? <HistoryScreen today={today} logs={allData.logs} /> :
                   tab === "insight" ? <InsightScreen logs={allData.logs} /> :
                                       <StatsScreen logs={allData.logs} />}
                </div>

                {!logging && syncStatus !== "loading" && (
                  <div className="bottom-nav">
                    {TABS.map(([id, icon, label]) => (
                      <button key={id} onClick={() => setTab(id)} style={{ flex: 1, padding: "12px 0 8px", background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                        <span style={{ fontSize: 20 }}>{icon}</span>
                        <span style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 11, fontWeight: 700, color: tab === id ? "var(--cyan)" : "var(--text2)" }}>{label}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </>
          );
        }

        function SyncBadge({ status }) {
          const map = { loading: ["#f0a500", "⟳", "กำลังโหลด…"], ready: ["var(--green)", "☁️", "Sheets"], saving: ["var(--cyan)", "⟳", "กำลังบันทึก…"], error: ["var(--danger)", "✕", "Sync Error"] };
          const [color, icon, label] = map[status] || map.error;
          return (
            <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color, background: `${color}15`, padding: "4px 10px", borderRadius: 20, border: `1px solid ${color}40` }}>
              <span>{icon}</span><span>{label}</span>
            </div>
          );
        }

        function LoadingScreen() {
          return <div style={{ textAlignment: "center", padding: "80px 20px" }}>กำลังโหลดข้อมูลโครงสร้างตาราง...</div>;
        }

        function TodayScreen({ schedule, today, todayLog, onLogCardio, onLogCals }) {
          const dateStr = today.toLocaleDateString("th-TH", { day:"numeric", month:"long", year:"numeric" });
          return (
            <div style={{ padding: "0 12px" }}>
              <div style={{ background:"var(--card)", borderRadius:20, padding:20, marginBottom:20, border:"1px solid var(--border)" }}>
                <div style={{ fontSize:12, color:"var(--text2)", marginBottom:4 }}>{dateStr}</div>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:24 }}>เป้าหมายตาราง: {schedule.label}</div>
                <div style={{ marginTop:8, fontSize:13, color:"var(--text2)" }}>{schedule.sub}</div>
              </div>

              {todayLog && (
                <div style={{ background:"#001a0e", border:"1px solid #00e67640", borderRadius:16, padding:16, marginBottom:20 }}>
                  <span style={{ color:"var(--green)", fontWeight:700 }}>บันทึกข้อมูลวันนี้แล้ว ✓</span>
                  <LogSummary log={todayLog} schedule={todayLog} />
                </div>
              )}

              <div style={{ background: "rgba(255,255,255,0.02)", padding: "16px", borderRadius: 20, border: "1px solid var(--border)" }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <button onClick={onLogCardio} className="bubble-btn bubble-btn-cardio">🏃 บันทึก Zone 2 Cardio</button>
                  <button onClick={onLogCals} className="bubble-btn bubble-btn-calisthenics">💪 บันทึก Calisthenics</button>
                </div>
              </div>
            </div>
          );
        }

        function LogSummary({ log, schedule }) {
          if (schedule.type === "cardio") return (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:10, marginTop:8, textAlign:"center" }}>
              <div><div style={{ color:"var(--cyan)", fontWeight:900 }}>{log.duration}</div><div style={{ fontSize:10 }}>นาที</div></div>
              <div><div style={{ color:"var(--green)", fontWeight:900 }}>{log.distance || "—"}</div><div style={{ fontSize:10 }}>กม.</div></div>
              <div><div style={{ color:"var(--orange)", fontWeight:900 }}>{calculatePace(log.duration, log.distance)}</div><div style={{ fontSize:10 }}>Avg Pace</div></div>
            </div>
          );
          return (
            <div style={{ marginTop:8 }}>
              {EXERCISES.map(ex => {
                const sets = log.exercises?.[ex.id];
                if (!sets || sets.every(s => !s)) return null;
                return <div key={ex.id} style={{ fontSize:12 }}>{ex.icon} {ex.name}: {sets.filter(Boolean).join(" / ")}</div>;
              })}
            </div>
          );
        }

        function LogScreen({ logType, onSave, onCancel, existingLog, saving }) {
          const isCardioMode = logType === "cardio";
          const [duration, setDuration] = useState(existingLog?.type === "cardio" ? (existingLog?.duration ?? "") : "");
          const [distance, setDistance] = useState(existingLog?.type === "cardio" ? (existingLog?.distance ?? "") : "");
          const [avgHR, setAvgHR]       = useState(existingLog?.type === "cardio" ? (existingLog?.avgHR ?? "") : "");
          const [notes, setNotes]       = useState(existingLog?.type === "cardio" ? (existingLog?.notes ?? "") : "");
          const [exSets, setExSets]     = useState(() => {
            const init = {};
            const activeLog = existingLog?.type === "calisthenics" ? existingLog : null;
            EXERCISES.forEach(ex => { init[ex.id] = activeLog?.exercises?.[ex.id] ?? ["","",""]; });
            return init;
          });

          const inp = { width:"100%", background:"var(--card2)", border:"1px solid var(--border)", borderRadius:12, padding:"14px 16px", color:"#fff", marginBottom:10, outline:"none" };

          return (
            <div style={{ padding:"0 12px" }}>
              <div style={{ display:"flex", gap:12, marginBottom:20, alignItems:"center" }}>
                <button onClick={onCancel} style={{ background:"var(--card)", border:"none", color:"#fff", padding:"8px 14px", borderRadius:10 }}>←</button>
                <div style={{ fontWeight:900, fontSize:20 }}>{isCardioMode ? "🏃 บันทึก Cardio" : "💪 บันทึก Strength"}</div>
              </div>

              {isCardioMode ? (
                <>
                  <input style={inp} type="number" placeholder="ระยะเวลา (นาที)" value={duration} onChange={e => setDuration(e.target.value)} />
                  <input style={inp} type="number" step="0.01" placeholder="ระยะทาง (กิโลเมตร)" value={distance} onChange={e => setDistance(e.target.value)} />
                  <input style={inp} type="number" placeholder="Average HR (bpm)" value={avgHR} onChange={e => setAvgHR(e.target.value)} />
                  <input style={inp} placeholder="หมายเหตุ" value={notes} onChange={e => setNotes(e.target.value)} />
                </>
              ) : (
                <div style={{ maxHeight:"60vh", overflowY:"auto" }}>
                  {EXERCISES.map(ex => (
                    <div key={ex.id} style={{ background:"var(--card)", padding:12, borderRadius:12, marginBottom:10 }}>
                      <div style={{ fontSize:14, fontWeight:700, marginBottom:6 }}>{ex.icon} {ex.name}</div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                        {[0,1,2].map(si => (
                          <input key={si} style={{ ...inp, textAlign:"center", padding:8 }} type="number" placeholder={`เซต ${si+1}`} value={exSets[ex.id][si]} onChange={e => { const v=[...exSets[ex.id]]; v[si]=e.target.value; setExSets(p=>({...p,[ex.id]:v})); }} />
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              <button onClick={() => {
                if (isCardioMode) onSave({ type:"cardio", duration, distance, avgHR, notes });
                else onSave({ type:"calisthenics", exercises:exSets });
              }} disabled={saving} className={`bubble-btn ${isCardioMode ? 'bubble-btn-cardio' : 'bubble-btn-calisthenics'}`}>
                {saving ? "กำลังบันทึก…" : "☁️ บันทึกลง Google Sheets"}
              </button>
            </div>
          );
        }

        function HistoryScreen({ today, logs }) {
          const weeks = Array.from({length:4}, (_,i) => Array.from({length:7}, (_,d) => { const dt=new Date(today); dt.setDate(dt.getDate()-(i*7+(6-d))); return dt; }));
          const [selectedDate, setSelectedDate] = useState(null);
          return (
            <div style={{ padding:"0 12px" }}>
              {weeks.map((week, wi) => (
                <div key={wi} style={{ marginBottom:14, background: "var(--card)", padding: "12px", borderRadius: 16, border: "1px solid var(--border)" }}>
                  <div style={{ fontSize:11, color:"var(--text2)" }}>สัปดาห์ที่ {wi === 0 ? "นี้" : wi + " ที่แล้ว"}</div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:5, marginTop:6 }}>
                    {week.map(date => {
                      const k = date.toISOString().slice(0, 10);
                      const log = logs[k];
                      const dot = log ? (log.type === "cardio" ? "var(--cyan)" : "var(--orange)") : null;
                      return (
                        <div key={k} onClick={() => log && setSelectedDate(selectedDate === k ? null : k)} style={{ background: selectedDate === k ? `${dot}30` : "#141c26", padding:"10px 2px", textAlign:"center", borderRadius:8, border: date.toISOString().slice(0,10) === today.toISOString().slice(0,10) ? "2px solid var(--cyan)" : "1px solid var(--border)" }}>
                          <div style={{ fontSize:10 }}>{DAYS_TH[date.getDay()]}</div>
                          <div style={{ fontSize:12, fontWeight:700 }}>{date.getDate()}</div>
                          <div style={{ width:6, height:6, borderRadius:"50%", background:dot||"transparent", margin:"4px auto 0" }} />
                        </div>
                      );
                    })}
                  </div>
                  {week.some(date => date.toISOString().slice(0, 10) === selectedDate) && (() => {
                    const currentLog = logs[selectedDate];
                    return (
                      <div className="fade-in" style={{ marginTop:12, padding:12, background:"var(--card2)", borderRadius:12 }}>
                        <div style={{ fontWeight:700, fontSize:13, color:"var(--cyan)" }}>📋 รายละเอียดประวัติการฝึก</div>
                        <LogSummary log={currentLog} schedule={currentLog} />
                      </div>
                    );
                  })()}
                </div>
              ))}
            </div>
          );
        }

        function calcStreak() { return 0; }
        function InsightScreen() { return <div style={{ padding:16 }}>AI Insight Module</div>; }
        function StatsScreen() { return <div style={{ padding:16 }}>Stats Module</div>; }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
