<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<title>Calisthenics & Zone 2 v2</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;900&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:#080c14;
  color:#fff;
  font-family:'Barlow',sans-serif;
}

:root{
  --cyan:#00d4ff;
  --green:#00e676;
  --orange:#ff6b2b;
  --card:#101824;
  --card2:#141e2c;
  --border:rgba(255,255,255,.06);
  --text2:#7a8fa8;
}

.app{
  max-width:430px;
  margin:auto;
  min-height:100vh;
  padding-bottom:110px;
}

.header{
  padding:22px 16px;
}

.title{
  font-family:'Barlow Condensed';
  font-size:28px;
  font-weight:900;
}

.section{
  padding:0 14px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
}

.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.btn{
  border:none;
  border-radius:16px;
  padding:14px;
  width:100%;
  color:#fff;
  font-weight:700;
  margin-bottom:10px;
}

.btn-blue{
  background:linear-gradient(135deg,#00d4ff,#0077ff);
}

.btn-orange{
  background:linear-gradient(135deg,#ff6b2b,#ff3d00);
}

.small{
  font-size:12px;
  color:var(--text2);
}

.big{
  font-size:26px;
  font-weight:900;
  font-family:'Barlow Condensed';
}

.bottom{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:430px;
  background:rgba(10,16,32,.94);
  backdrop-filter:blur(12px);
  display:flex;
  border-top:1px solid var(--border);
}

.tab{
  flex:1;
  padding:12px 0;
  border:none;
  background:none;
  color:var(--text2);
  font-size:11px;
  font-weight:700;
}

.tab.active{
  color:var(--cyan);
}

.input{
  width:100%;
  background:var(--card2);
  border:1px solid var(--border);
  color:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
}

.session{
  background:var(--card2);
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
}

.tag{
  display:inline-block;
  background:#00e67620;
  color:var(--green);
  border:1px solid #00e67640;
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
  margin-bottom:10px;
}

.ai{
  background:linear-gradient(135deg,#1a0d2e,#0d1a2e);
  border:1px solid #a855f740;
}

.recovery{
  width:90px;
  height:90px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-size:26px;
  font-weight:900;
  font-family:'Barlow Condensed';
  background:rgba(0,230,118,.12);
  border:2px solid var(--green);
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {
  LineChart,
  Line,
  XAxis,
  YAxis,
  Tooltip,
  ResponsiveContainer
} = Recharts;

const STORAGE_KEY = "fitness_v2";

const EXERCISES = [
  {
    id:"aus_pull",
    name:"Australian Pull-Ups"
  },
  {
    id:"pushup",
    name:"Push-Ups"
  },
  {
    id:"squat",
    name:"Squats"
  }
];

function loadData(){

  try{

    const raw = localStorage.getItem(STORAGE_KEY);

    if(!raw){
      return { logs:{} };
    }

    return JSON.parse(raw);

  }catch{

    return { logs:{} };

  }

}

function saveData(data){

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(data)
  );

}

function calculateRecovery(logs){

  const all = Object.values(logs).flat();

  if(all.length === 0){
    return 100;
  }

  let score = 100;

  const recent = all.slice(-5);

  recent.forEach(session => {

    if(session.type === "cardio"){

      const hr = Number(session.avgHR || 0);

      if(hr > 155){
        score -= 14;
      }else if(hr > 148){
        score -= 7;
      }

    }

  });

  return Math.max(25,Math.min(100,score));

}

function generateCoachMessage(recovery){

  if(recovery < 45){
    return "Recovery ต่ำ แนะนำพักหรือเดินเบา";
  }

  if(recovery < 70){
    return "เหมาะกับ Zone 2 เบาๆ";
  }

  return "ร่างกายพร้อมสำหรับ strength training";
}

function pace(duration,distance){

  if(!duration || !distance){
    return "--";
  }

  const sec = (duration * 60) / distance;

  const m = Math.floor(sec / 60);

  const s = Math.round(sec % 60);

  return m + ":" + (s < 10 ? "0"+s : s);

}

function App(){

  const [tab,setTab] = React.useState("today");

  const [data,setData] = React.useState({
    logs:{}
  });

  const [showForm,setShowForm] =
    React.useState(false);

  const [type,setType] =
    React.useState("cardio");

  React.useEffect(() => {

    setData(loadData());

  },[]);

  const todayKey =
    new Date().toISOString().slice(0,10);

  const rawToday =
    data.logs?.[todayKey];

  const sessions =
    Array.isArray(rawToday)
      ? rawToday
      : rawToday
        ? [rawToday]
        : [];

  const recovery =
    calculateRecovery(data.logs);

  const coach =
    generateCoachMessage(recovery);

  function addSession(payload){

    const current =
      data.logs?.[todayKey] || [];

    const next = {
      ...data,
      logs:{
        ...data.logs,
        [todayKey]:[
          ...current,
          {
            ...payload,
            id:"sess_"+Date.now(),
            createdAt:new Date().toISOString()
          }
        ]
      }
    };

    setData(next);

    saveData(next);

    setShowForm(false);

  }

  function deleteSession(id){

    const current =
      data.logs?.[todayKey] || [];

    const filtered =
      current.filter(x => x.id !== id);

    const next = {
      ...data,
      logs:{
        ...data.logs,
        [todayKey]:filtered
      }
    };

    setData(next);

    saveData(next);

  }

  const cardioData =
    Object.entries(data.logs)
      .map(([date,sessions]) => {

        const cardio =
          sessions.find(
            s => s.type === "cardio"
          );

        return {
          date:date.slice(5),
          pace:cardio
            ? Number(
                (
                  cardio.duration /
                  cardio.distance
                ).toFixed(2)
              )
            : null
        };

      })
      .filter(x => x.pace);

  return(

    <div className="app">

      <div className="header">

        <div className="title">
          Calisthenics & Zone 2
        </div>

      </div>

      <div className="section">

        {tab === "today" && (

          <>

            <div className="card ai">

              <div className="small">
                RECOVERY SCORE
              </div>

              <div style={{height:14}}/>

              <div className="recovery">
                {recovery}%
              </div>

              <div style={{height:14}}/>

              <div
                style={{
                  textAlign:"center",
                  fontWeight:700
                }}
              >
                {coach}
              </div>

            </div>

            <div className="card">

              <button
                className="btn btn-blue"
                onClick={() => {
                  setType("cardio");
                  setShowForm(true);
                }}
              >
                🏃 Add Cardio
              </button>

              <button
                className="btn btn-orange"
                onClick={() => {
                  setType("strength");
                  setShowForm(true);
                }}
              >
                💪 Add Strength
              </button>

            </div>

            {showForm && (

              <Form
                type={type}
                onSave={addSession}
                onCancel={() => setShowForm(false)}
              />

            )}

            <div className="card">

              <div className="row">

                <div
                  style={{
                    fontWeight:700
                  }}
                >
                  Today's Sessions
                </div>

                <div className="small">
                  {sessions.length} sessions
                </div>

              </div>

            </div>

            {sessions.map(session => (

              <div
                key={session.id}
                className="section"
              >

                <div className="session">

                  <div className="tag">
                    {session.type}
                  </div>

                  {session.type === "cardio" ? (

                    <>

                      <div
                        style={{
                          fontWeight:700,
                          marginBottom:10
                        }}
                      >
                        🏃 Cardio Session
                      </div>

                      <div className="small">
                        Duration:
                        {" "}
                        {session.duration}
                        {" "}
                        min
                      </div>

                      <div className="small">
                        Distance:
                        {" "}
                        {session.distance}
                        {" "}
                        km
                      </div>

                      <div className="small">
                        HR:
                        {" "}
                        {session.avgHR}
                      </div>

                      <div className="small">
                        Pace:
                        {" "}
                        {pace(
                          session.duration,
                          session.distance
                        )}
                      </div>

                    </>

                  ) : (

                    <>

                      <div
                        style={{
                          fontWeight:700,
                          marginBottom:10
                        }}
                      >
                        💪 Strength Session
                      </div>

                      {Object.entries(
                        session.exercises || {}
                      ).map(([k,v]) => (

                        <div
                          key={k}
                          className="small"
                        >
                          {k}
                          :
                          {" "}
                          {v.join("/")}
                        </div>

                      ))}

                    </>

                  )}

                  <div style={{height:10}}/>

                  <button
                    className="btn"
                    style={{
                      background:"#ff4757"
                    }}
                    onClick={() => {
                      deleteSession(session.id);
                    }}
                  >
                    Delete
                  </button>

                </div>

              </div>

            ))}

          </>

        )}

        {tab === "analytics" && (

          <div className="card">

            <div
              style={{
                fontWeight:700,
                marginBottom:14
              }}
            >
              📈 Pace Trend
            </div>

            <div style={{height:260}}>

              <ResponsiveContainer
                width="100%"
                height="100%"
              >

                <LineChart data={cardioData}>

                  <XAxis dataKey="date"/>

                  <YAxis/>

                  <Tooltip/>

                  <Line
                    type="monotone"
                    dataKey="pace"
                    stroke="#00d4ff"
                    strokeWidth={3}
                  />

                </LineChart>

              </ResponsiveContainer>

            </div>

          </div>

        )}

        {tab === "coach" && (

          <div className="card ai">

            <div
              style={{
                fontWeight:700,
                marginBottom:10
              }}
            >
              🧠 AI Coach
            </div>

            <div
              style={{
                lineHeight:1.7,
                color:"#d9e6f2"
              }}
            >
              {coach}
            </div>

          </div>

        )}

      </div>

      <div className="bottom">

        <button
          className={
            "tab " +
            (tab === "today"
              ? "active"
              : "")
          }
          onClick={() => setTab("today")}
        >
          TODAY
        </button>

        <button
          className={
            "tab " +
            (tab === "analytics"
              ? "active"
              : "")
          }
          onClick={() => setTab("analytics")}
        >
          ANALYTICS
        </button>

        <button
          className={
            "tab " +
            (tab === "coach"
              ? "active"
              : "")
          }
          onClick={() => setTab("coach")}
        >
          AI COACH
        </button>

      </div>

    </div>

  );

}

function Form({
  type,
  onSave,
  onCancel
}){

  const [duration,setDuration] =
    React.useState("");

  const [distance,setDistance] =
    React.useState("");

  const [avgHR,setAvgHR] =
    React.useState("");

  const [exercises,setExercises] =
    React.useState({
      aus_pull:["","",""],
      pushup:["","",""],
      squat:["","",""]
    });

  return(

    <div className="card">

      <div
        style={{
          fontWeight:700,
          marginBottom:14
        }}
      >
        Add Session
      </div>

      {type === "cardio" ? (

        <>

          <input
            className="input"
            placeholder="Duration"
            value={duration}
            onChange={e =>
              setDuration(e.target.value)
            }
          />

          <input
            className="input"
            placeholder="Distance"
            value={distance}
            onChange={e =>
              setDistance(e.target.value)
            }
          />

          <input
            className="input"
            placeholder="Average HR"
            value={avgHR}
            onChange={e =>
              setAvgHR(e.target.value)
            }
          />

        </>

      ) : (

        EXERCISES.map(ex => (

          <div key={ex.id}>

            <div
              style={{
                marginBottom:6,
                fontWeight:700
              }}
            >
              {ex.name}
            </div>

            <div
              style={{
                display:"grid",
                gridTemplateColumns:
                  "1fr 1fr 1fr",
                gap:8
              }}
            >

              {[0,1,2].map(i => (

                <input
                  key={i}
                  className="input"
                  placeholder={
                    "Set " + (i+1)
                  }
                  value={
                    exercises[ex.id][i]
                  }
                  onChange={e => {

                    const next = {
                      ...exercises
                    };

                    next[ex.id][i] =
                      e.target.value;

                    setExercises(next);

                  }}
                />

              ))}

            </div>

          </div>

        ))

      )}

      <button
        className="btn btn-blue"
        onClick={() => {

          if(type === "cardio"){

            onSave({
              type:"cardio",
              duration:Number(duration),
              distance:Number(distance),
              avgHR:Number(avgHR)
            });

          }else{

            onSave({
              type:"strength",
              exercises
            });

          }

        }}
      >
        Save Session
      </button>

      <button
        className="btn"
        style={{
          background:"#2a3446"
        }}
        onClick={onCancel}
      >
        Cancel
      </button>

    </div>

  );

}

ReactDOM
  .createRoot(
    document.getElementById("root")
  )
  .render(<App/>);

</script>

</body>
</html>
